<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Origin" />
    <meta name="theme-color" content="#FAFAF8" />
    <link rel="manifest" href="/manifest.json" />
    <title>Origin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Crimson+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100vh; height: 100dvh; }
      /* Hide scrollbars — content still scrolls, just no visible bar. */
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { width: 0; height: 0; display: none; }
      body { color: #1A1A1A; }
      /* Origin is mobile-only on all viewports — see ORIGIN-HANDOFF.md
         "Parked: Clinician Dashboard". On desktop (≥1024px) body is
         constrained to a centered ~440px phone-frame column. translateZ(0)
         on body makes it a containing block so fixed-position portals
         (Modal bottom sheet, Toast, Popover) anchor to the phone-frame
         edges instead of the full viewport. */
      @media (min-width: 1024px) {
        html { background: #0D0D0D; }
        body {
          max-width: 440px;
          margin: 0 auto;
          /* Phone-frame side edges painted INSIDE the content area via
             inset box-shadow (2px to survive subpixel slicing). */
          box-shadow: inset 2px 0 0 #2A2A2A, inset -2px 0 0 #2A2A2A;
          overflow: hidden;
          /* clip-path enforces strict clipping of fixed-position descendants
             (slide-in screens that translate off-body). transform: translateZ
             makes body the containing block so fixed children (slide-in
             screens, Modal bottom sheet, Toast) anchor inside the phone-frame
             instead of stretching across the viewport. Popover uses
             getBoundingClientRect (viewport coords) and compensates by
             subtracting bodyRect offset on desktop — see Popover.jsx. */
          clip-path: inset(0);
          transform: translateZ(0);
        }
      }
      /* Width-lock: invisible bold ghost prevents layout shift when selector weight changes */
      .selector-label { position: relative; display: inline-block; }
      .selector-label::before { content: attr(data-text); font-weight: 600; visibility: hidden; height: 0; display: block; overflow: hidden; pointer-events: none; }
      button:active { opacity: 0.75; transition: opacity 60ms ease-out; }
      /* Hide the native clock/calendar picker indicator on time and date inputs.
         The HH:MM text is sufficient and the icon doesn't add value on Origin's
         compact surfaces (Hero anchor edit, schedule editor, etc.). */
      input[type="time"]::-webkit-calendar-picker-indicator,
      input[type="date"]::-webkit-calendar-picker-indicator { display: none; }
      input[type="time"]::-webkit-inner-spin-button,
      input[type="time"]::-webkit-clear-button { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
        /* HIG exception: Toast appearance preserved — essential "something happened"
           feedback. Brief slide-in from bottom, contained to viewport edge,
           non-repetitive. Without it, users with reduced-motion have no
           confirmation that their action registered. */
        .toast-item { transition: transform 250ms ease-out, opacity 200ms ease-out !important; }
        /* HIG exception: Checkbox state transition preserved — tap-registered feedback.
           Brief 150ms in-place color change communicates a state toggle occurred.
           In-place (not moving), single occurrence per action, essential confirmation. */
        .supp-checkbox { transition: background 150ms ease, border-color 150ms ease !important; }
        /* HIG exception: Row hover transitions preserved — interactivity affordance
           on desktop. Subtle 150ms background change indicates a surface is
           hoverable/interactive. Without it, desktop rows appear inert. */
        .supp-row { transition: background 150ms ease !important; }
        .sidebar-nav-item { transition: background 150ms ease, color 150ms ease !important; }
        .day-cell { transition: background 150ms ease, border-color 150ms ease, transform 150ms ease, box-shadow 150ms ease !important; }
      }
      :focus-visible { outline: 1px solid #FFFFFF; outline-offset: 2px; }
    </style>
  </head>
  <body>
    <script>
      (function(){
        var CANVAS={achromatic:'#0D0D0D',dark:'#04060A',light:'#F4F6F8',terminalAmber:'#0D0D0D',terminalCyan:'#0D0D0D',terminalPhosphor:'#0D0D0D',terminalMagenta:'#0D0D0D'};
        try{
          var pref=localStorage.getItem('origin_theme_preference')||'system';
          var name=pref==='system'?(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):pref;
          document.body.style.background=CANVAS[name]||'#F4F6F8';
        }catch(e){}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if (new URLSearchParams(location.search).has('debug')) localStorage.setItem('debug', 'true');
      if (
        location.hostname === 'localhost' ||
        new URLSearchParams(location.search).has('debug') ||
        localStorage.getItem('debug') === 'true'
      ) {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.onload = () => eruda.init();
        document.body.appendChild(s);
      }
    </script>
  </body>
</html>
