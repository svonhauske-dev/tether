<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Origin" />
    <meta name="theme-color" content="#FAFAF8" />
    <link rel="manifest" href="/manifest.json" />
    <title>Origin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&family=Crimson+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100vh; height: 100dvh; }
      body { color: #1A1A1A; }
      /* Width-lock: invisible bold ghost prevents layout shift when pill weight changes */
      .pill-label { position: relative; display: inline-block; }
      .pill-label::before { content: attr(data-text); font-weight: 600; visibility: hidden; height: 0; display: block; overflow: hidden; pointer-events: none; }
      button:active { opacity: 0.75; transition: opacity 60ms ease-out; }
    </style>
  </head>
  <body>
    <script>
      (function(){
        var CANVAS={dark:'#04060A',light:'#F4F6F8',terminalAmber:'#0D0D0D',terminalCyan:'#0D0D0D',terminalPhosphor:'#0D0D0D',terminalAchromatic:'#0D0D0D',terminalMagenta:'#0D0D0D'};
        try{
          var pref=localStorage.getItem('origin_theme_preference')||'system';
          var name=pref==='system'?(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):pref;
          document.body.style.background=CANVAS[name]||'#F4F6F8';
        }catch(e){}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if (new URLSearchParams(location.search).has('debug')) localStorage.setItem('debug', 'true');
      if (
        location.hostname === 'localhost' ||
        new URLSearchParams(location.search).has('debug') ||
        localStorage.getItem('debug') === 'true'
      ) {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.onload = () => eruda.init();
        document.body.appendChild(s);
      }
    </script>
  </body>
</html>
